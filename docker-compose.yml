version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: portafolio-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./frontend/public/uploads:/app/frontend/public/uploads
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portafolio-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/public/uploads:/usr/share/nginx/html/uploads
    depends_on:
      - backend
    restart: always
